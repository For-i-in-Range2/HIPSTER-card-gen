<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hitster Maison</title>

  <!-- Application web installable (PWA) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0e0e12" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
  <!-- iOS : icône écran d'accueil + plein écran -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hitster" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="style.css" />
  <!-- SDK de lecture Spotify (ne sert qu'en mode réel, ignoré en démo) -->
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>
  <main id="app"></main>
  <script type="module" src="app.js"></script>
  <!-- Enregistrement du service worker (installation + chargement instantané) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
